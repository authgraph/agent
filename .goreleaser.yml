version: 2

project_name: authgraph-agent

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/agent
    binary: authgraph-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "ghcr.io/authgraph/agent:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "ghcr.io/authgraph/agent:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/authgraph/agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/authgraph/agent:{{ .Version }}-amd64"
      - "ghcr.io/authgraph/agent:{{ .Version }}-arm64"
  - name_template: "ghcr.io/authgraph/agent:latest"
    image_templates:
      - "ghcr.io/authgraph/agent:{{ .Version }}-amd64"
      - "ghcr.io/authgraph/agent:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: authgraph
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://authgraph.dev"
    description: "Authgraph Agent — MCP server and AI permissions agent"
    license: "MIT"
    install: |
      bin.install "authgraph-agent"
    test: |
      system "#{bin}/authgraph-agent", "version"

release:
  github:
    owner: authgraph
    name: agent
  prerelease: auto
